<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python 技能檢定測驗</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; scroll-behavior: smooth; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-bottom: 1px solid #334155;
            position: sticky;
            top: 0;
            z-index: 40;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-title { display: flex; align-items: center; gap: 15px; }
        .header-title h1 { font-size: 24px; font-weight: bold; }
        .header-subtitle { color: #94a3b8; font-size: 14px; margin-top: 4px; }
        .header-actions { display: flex; gap: 15px; }
        .btn-icon {
            width: 40px; height: 40px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: transparent;
            color: #cbd5e1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }
        .btn-icon:hover { background: #1e293b; }
        
        .panel { 
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 30px;
            margin: 20px auto;
            max-width: 900px;
        }
        .panel h2 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .panel-subtitle { color: #94a3b8; margin-bottom: 20px; }
        
        .mode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin: 20px 0;
        }
        .mode-card {
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            background: rgba(45, 85, 255, 0.05);
            transition: all 0.3s;
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }
        .mode-card:hover {
            border-color: #3b82f6;
            background: rgba(45, 85, 255, 0.1);
            transform: translateY(-2px);
        }
        .mode-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }
        .mode-icon {
            width: 50px; height: 50px;
            border-radius: 8px;
            background: rgba(59, 130, 246, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }
        .mode-title { font-weight: 600; font-size: 16px; }
        .mode-desc { color: #94a3b8; font-size: 12px; margin-top: 4px; }
        
        .settings { background: rgba(15, 23, 42, 0.5); padding: 15px; border-radius: 8px; margin: 20px 0; }
        .checkbox { margin-right: 8px; }
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
        }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-secondary { background: #334155; color: #e2e8f0; }
        .btn-secondary:hover { background: #475569; }
        
        .question-panel {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            margin: 20px auto;
            max-width: 800px;
        }
        .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .q-number { color: #94a3b8; font-size: 12px; font-weight: 600; }
        .q-text { font-size: 18px; font-weight: 600; margin: 15px 0; line-height: 1.6; }
        .q-code {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            margin: 15px 0;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #cbd5e1;
        }
        
        .options { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }
        .option-btn {
            padding: 15px;
            border: 1px solid #334155;
            border-radius: 8px;
            background: rgba(45, 85, 255, 0.03);
            color: #f1f5f9;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .option-btn:hover:not(:disabled) {
            border-color: #3b82f6;
            background: rgba(45, 85, 255, 0.08);
        }
        .option-btn:disabled { cursor: not-allowed; }
        .option-btn.correct { border-color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .option-btn.wrong { border-color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        .option-letter {
            width: 30px; height: 30px;
            border-radius: 6px;
            background: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 12px;
            flex-shrink: 0;
        }
        .option-btn.correct .option-letter { background: #10b981; }
        .option-btn.wrong .option-letter { background: #ef4444; }
        
        .feedback {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            display: none;
        }
        .feedback.show { display: block; }
        .feedback.correct { background: rgba(16, 185, 129, 0.15); border-left: 3px solid #10b981; color: #10b981; }
        .feedback.wrong { background: rgba(239, 68, 68, 0.15); border-left: 3px solid #ef4444; color: #ef4444; }
        .feedback-title { font-weight: 600; margin-bottom: 8px; }
        
        .nav-buttons { display: flex; gap: 10px; margin: 20px 0; }
        .nav-buttons button { flex: 1; }
        
        .results-container {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            margin: 20px auto;
            max-width: 700px;
        }
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }
        .result-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 15px;
        }
        .result-label { color: #94a3b8; font-size: 12px; margin-bottom: 8px; }
        .result-value { font-size: 24px; font-weight: 700; color: #3b82f6; }
        
        .hidden { display: none !important; }
        
        @media (max-width: 768px) {
            .mode-grid { grid-template-columns: 1fr; }
            .panel { padding: 20px; }
            .question-panel { padding: 15px; }
            .q-text { font-size: 16px; }
            .results-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">
            <div style="font-size:24px;">🐍</div>
            <div>
                <h1>Python 技能檢定挑戰</h1>
                <div class="header-subtitle"><span id="total-count">加載中</span> 題・每題 3.0 分</div>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn-icon" onclick="toggleMute()" title="靜音">🔊</button>
            <button class="btn-icon" onclick="toggleTheme()" title="暗色主題">🌙</button>
        </div>
    </div>

    <div class="container">
        <!-- 歡迎面板 -->
        <div id="welcome-panel" class="panel">
            <h2>Python 程式設計測驗</h2>
            <p class="panel-subtitle" id="welcome-desc">本測驗收錄了精選 Python 重點題目。</p>

            <h3 style="margin: 20px 0 15px; font-weight: 600; font-size: 16px;">📋 請選擇測驗模式</h3>
            <div class="mode-grid">
                <div class="mode-card" onclick="startQuiz('full')">
                    <div class="mode-icon">📚</div>
                    <div>
                        <div class="mode-title">全能挑戰模式 (<span id="mode-count">加載中</span> 題)</div>
                        <div class="mode-desc">完整作答所有題目。</div>
                    </div>
                </div>

                <div class="mode-card" onclick="startQuiz('speed')">
                    <div class="mode-icon">⚡</div>
                    <div>
                        <div class="mode-title">精選快問模式 (20 題)</div>
                        <div class="mode-desc">隨機抽取 20 道題目。</div>
                    </div>
                </div>

                <div class="mode-card disabled" id="weakness-card">
                    <div class="mode-icon">⚠️</div>
                    <div>
                        <div class="mode-title">錯題強化模式</div>
                        <div class="mode-desc" id="weakness-desc">目前尚無錯題紀錄。</div>
                    </div>
                </div>

                <div class="mode-card disabled" id="bookmark-card">
                    <div class="mode-icon">🔖</div>
                    <div>
                        <div class="mode-title">書籤複習模式</div>
                        <div class="mode-desc" id="bookmark-desc">目前無書籤。</div>
                    </div>
                </div>
            </div>

            <div class="settings">
                <label>
                    <input type="checkbox" class="checkbox" id="practice-mode" checked>
                    <span>啟用練習回饋</span>
                </label>
            </div>
        </div>

        <!-- 測驗面板 -->
        <div id="quiz-panel" class="hidden">
            <div style="background: rgba(30, 41, 59, 0.6); border: 1px solid #334155; border-radius: 12px; padding: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 15px;">
                <div>
                    <span style="color: #3b82f6; font-weight: 600;">全能挑戰</span>
                    <span style="color: #94a3b8; margin-left: 10px;">進度: <span id="progress" class="font-bold">0/0</span></span>
                </div>
                <div style="display: flex; gap: 20px;">
                    <div>計時: <span id="timer" style="font-family: monospace; font-weight: 600;">00:00</span></div>
                    <div>準確率: <span id="accuracy" style="color: #10b981; font-weight: 600;">100%</span></div>
                </div>
            </div>

            <div class="question-panel">
                <div class="q-header">
                    <span class="q-number">QUESTION <span id="q-num">1</span></span>
                    <button class="btn-icon" onclick="toggleBookmark()" title="加入書籤" id="bookmark-btn">🔖</button>
                </div>

                <div class="q-text" id="question-text">題目加載中...</div>
                <div class="q-code hidden" id="code-box"></div>

                <div class="options" id="options-container"></div>

                <div class="feedback" id="feedback-box">
                    <div class="feedback-title" id="feedback-title"></div>
                    <div id="feedback-content"></div>
                </div>

                <div class="nav-buttons">
                    <button class="btn btn-secondary" onclick="prevQuestion()" id="prev-btn">← 上一題</button>
                    <button class="btn btn-primary" onclick="nextQuestion()" id="next-btn">下一題 →</button>
                </div>
            </div>
        </div>

        <!-- 結果面板 -->
        <div id="results-panel" class="hidden results-container">
            <h2 style="font-size: 32px; margin-bottom: 20px;">🎉 恭喜完成！</h2>
            <div class="results-grid">
                <div class="result-card">
                    <div class="result-label">最終得分</div>
                    <div class="result-value" id="result-score">0/0</div>
                </div>
                <div class="result-card">
                    <div class="result-label">答對題數</div>
                    <div class="result-value" id="result-correct">0/0</div>
                </div>
                <div class="result-card">
                    <div class="result-label">準確率</div>
                    <div class="result-value" id="result-accuracy">0%</div>
                </div>
                <div class="result-card">
                    <div class="result-label">耗費時間</div>
                    <div class="result-value" id="result-time">00:00</div>
                </div>
            </div>

            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="btn btn-primary" onclick="returnToWelcome()">返回大廳</button>
                <button class="btn btn-secondary" onclick="retryQuiz()">重新挑戰</button>
            </div>
        </div>
    </div>

    <script>
        let allQuestions = [];
        let currentQuestions = [];
        let currentIndex = 0;
        let answers = {};
        let bookmarked = new Set();
        let wrong = new Set();
        let mode = '';
        let isPractice = true;
        let startTime = 0;

        // 初始化
        async function init() {
            try {
                const res = await fetch('questions.json');
                allQuestions = await res.json();
                document.getElementById('total-count').textContent = allQuestions.length;
                document.getElementById('mode-count').textContent = allQuestions.length;
                loadStorage();
            } catch (e) {
                alert('無法加載題目: ' + e.message);
            }
        }

        function loadStorage() {
            const bk = localStorage.getItem('py_bookmarks');
            if (bk) bookmarked = new Set(JSON.parse(bk));
            const wr = localStorage.getItem('py_wrong');
            if (wr) wrong = new Set(JSON.parse(wr));
            updateModes();
        }

        function updateModes() {
            const wc = document.getElementById('weakness-card');
            const bc = document.getElementById('bookmark-card');
            
            if (wrong.size > 0) {
                wc.classList.remove('disabled');
                wc.onclick = () => startQuiz('weakness');
                document.getElementById('weakness-desc').innerHTML = `有 <strong>${wrong.size}</strong> 道錯題`;
            }
            
            if (bookmarked.size > 0) {
                bc.classList.remove('disabled');
                bc.onclick = () => startQuiz('bookmark');
                document.getElementById('bookmark-desc').innerHTML = `已收藏 <strong>${bookmarked.size}</strong> 道題`;
            }
        }

        function startQuiz(m) {
            mode = m;
            isPractice = document.getElementById('practice-mode').checked;
            
            if (m === 'full') currentQuestions = allQuestions;
            else if (m === 'speed') currentQuestions = allQuestions.sort(() => 0.5 - Math.random()).slice(0, 20);
            else if (m === 'weakness') currentQuestions = allQuestions.filter(q => wrong.has(q.id));
            else if (m === 'bookmark') currentQuestions = allQuestions.filter(q => bookmarked.has(q.id));

            answers = {};
            currentIndex = 0;
            startTime = Date.now();

            document.getElementById('welcome-panel').classList.add('hidden');
            document.getElementById('results-panel').classList.add('hidden');
            document.getElementById('quiz-panel').classList.remove('hidden');

            renderQuestion();
            startTimer();
        }

        function renderQuestion() {
            if (currentQuestions.length === 0) return;
            const q = currentQuestions[currentIndex];

            document.getElementById('q-num').textContent = `${currentIndex + 1} / ${currentQuestions.length}`;
            document.getElementById('question-text').textContent = `${q.id}. ${q.q}`;
            document.getElementById('progress').textContent = `${currentIndex + 1} / ${currentQuestions.length}`;

            const cb = document.getElementById('code-box');
            if (q.code) {
                cb.textContent = q.code;
                cb.classList.remove('hidden');
            } else {
                cb.classList.add('hidden');
            }

            const oc = document.getElementById('options-container');
            oc.innerHTML = '';

            const answered = answers[q.id] !== undefined;
            q.o.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="option-letter">${String.fromCharCode(65 + i)}</span><span>${opt}</span>`;
                
                if (!answered) btn.onclick = () => selectAnswer(i);
                else btn.disabled = true;

                oc.appendChild(btn);
            });

            if (answered) highlightAnswer(q);

            document.getElementById('prev-btn').disabled = currentIndex === 0;
            const nb = document.getElementById('next-btn');
            if (currentIndex === currentQuestions.length - 1) {
                nb.textContent = '提交試卷 ✓';
                nb.onclick = finishQuiz;
            } else {
                nb.textContent = '下一題 →';
                nb.onclick = nextQuestion;
            }
        }

        function selectAnswer(idx) {
            const q = currentQuestions[currentIndex];
            answers[q.id] = idx;

            if (idx !== q.a) wrong.add(q.id);
            else wrong.delete(q.id);
            
            localStorage.setItem('py_wrong', JSON.stringify(Array.from(wrong)));
            highlightAnswer(q);
            updateAccuracy();
        }

        function highlightAnswer(q) {
            const btns = document.querySelectorAll('.option-btn');
            const ans = answers[q.id];

            btns.forEach((btn, i) => {
                btn.disabled = true;
                if (i === q.a) {
                    btn.classList.add('correct');
                } else if (i === ans && ans !== q.a) {
                    btn.classList.add('wrong');
                }
            });

            if (isPractice) {
                const fb = document.getElementById('feedback-box');
                const fbTitle = document.getElementById('feedback-title');
                const fbContent = document.getElementById('feedback-content');

                fbTitle.textContent = ans === q.a ? '✓ 答案正確！' : '✗ 答案錯誤';
                fbContent.innerHTML = `正確答案: ${q.o[q.a]}<br>解析: ${q.note}`;
                fb.classList.add('show');
                fb.classList.toggle('correct', ans === q.a);
                fb.classList.toggle('wrong', ans !== q.a);
            }
        }

        function updateAccuracy() {
            let correct = 0, total = 0;
            currentQuestions.forEach(q => {
                if (answers[q.id] !== undefined) {
                    total++;
                    if (answers[q.id] === q.a) correct++;
                }
            });
            document.getElementById('accuracy').textContent = total === 0 ? '100%' : Math.round(correct / total * 100) + '%';
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        function nextQuestion() {
            if (currentIndex < currentQuestions.length - 1) {
                currentIndex++;
                renderQuestion();
            }
        }

        function toggleBookmark() {
            const q = currentQuestions[currentIndex];
            if (bookmarked.has(q.id)) bookmarked.delete(q.id);
            else bookmarked.add(q.id);
            localStorage.setItem('py_bookmarks', JSON.stringify(Array.from(bookmarked)));
        }

        function startTimer() {
            setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const m = Math.floor(elapsed / 60);
                const s = elapsed % 60;
                document.getElementById('timer').textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }, 1000);
        }

        function finishQuiz() {
            let correct = 0;
            currentQuestions.forEach(q => {
                if (answers[q.id] === q.a) correct++;
            });

            const total = currentQuestions.length;
            const score = correct * 3;
            const accuracy = Math.round(correct / total * 100);
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const m = Math.floor(elapsed / 60);
            const s = elapsed % 60;

            document.getElementById('result-score').textContent = `${score} / ${total * 3}`;
            document.getElementById('result-correct').textContent = `${correct} / ${total}`;
            document.getElementById('result-accuracy').textContent = `${accuracy}%`;
            document.getElementById('result-time').textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;

            document.getElementById('quiz-panel').classList.add('hidden');
            document.getElementById('results-panel').classList.remove('hidden');
        }

        function returnToWelcome() {
            document.getElementById('welcome-panel').classList.remove('hidden');
            document.getElementById('results-panel').classList.add('hidden');
        }

        function retryQuiz() {
            startQuiz(mode);
        }

        function toggleMute() { alert('音效已禁用 (演示版)'); }
        function toggleTheme() { document.body.style.filter = document.body.style.filter === 'invert(1)' ? '' : 'invert(1)'; }

        init();
    </script>
</body>
</html>
