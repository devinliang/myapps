<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI思維與程式設計 | ICTP Python 題庫</title>
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">


    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .answered-nav {
            background-color: #3b82f6 !important;
            color: white !important;
        }
        .correct-nav {
            border-color: #10b981 !important;
            box-shadow: 0 0 0 1px #10b981;
        }
        .wrong-nav {
            border-color: #ef4444 !important;
            box-shadow: 0 0 0 1px #ef4444;
        }
        .correct-bg {
            background-color: #f0fdf4;
            border: 1px solid #10b981;
        }
        .wrong-bg {
            background-color: #fef2f2;
            border: 1px solid #ef4444;
        }
        pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 0.5rem;
            border-radius: 4px;
            overflow-x: auto;
            margin: 4px 0;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 1rem;
            line-height: 1.3;
        }
        .option-btn:disabled {
            cursor: default;
        }
        #nav-grid::-webkit-scrollbar {
            width: 3px;
        }
        #nav-grid::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-900 leading-tight">

    <div class="flex h-screen overflow-hidden">
        <!-- 左側題號導覽 -->
        <aside class="w-20 md:w-56 bg-white shadow-xl flex flex-col border-r border-slate-200">
            <div class="p-3 border-b bg-slate-50">
                <h1 class="text-md font-bold text-blue-700">題目選號</h1>
                <div class="mt-1 flex items-center justify-between text-[10px] text-slate-500">
                    <span>進度: <span id="progress-text">0/208</span></span>
                    <span id="score-text">0% 正確</span>
                </div>
                <div class="w-full bg-slate-200 h-1 mt-1 rounded-full overflow-hidden">
                    <div id="progress-bar" class="bg-blue-500 h-full w-0 transition-all duration-300"></div>
                </div>
            </div>
            <div id="nav-grid" class="flex-1 overflow-y-auto p-1.5 grid grid-cols-1 md:grid-cols-4 gap-1">
                <!-- JS 自動生成所有按鈕 -->
            </div>
        </aside>

        <!-- 右側題目內容 -->
        <main class="flex-1 overflow-y-auto p-3 md:p-6 relative scroll-smooth bg-slate-100">
            <div class="max-w-4xl mx-auto">
                <header class="mb-3 flex items-center justify-between">
                    <div>
                        <h2 class="text-lg md:text-xl font-black text-slate-800 uppercase tracking-tight">AI思維與程式設計·Python 核心能力題庫</h2>
                        <p class="text-slate-500 text-[10px] md:text-xs">線上練習系統完整版</p>
                    </div>
                </header>

                <div id="quiz-container" class="space-y-3 pb-32">
                    <!-- JS 自動生成題目卡片 -->
                </div>
            </div>
        </main>
    </div>

    <!-- 訊息提示 -->
    <div id="toast" class="fixed bottom-6 right-6 bg-slate-800 text-white px-4 py-2 rounded-full shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none z-50 text-xs font-bold">
        已跳轉
    </div>

    <script>
        let questionsData = [];

        const quizContainer = document.getElementById('quiz-container');
        const navGrid = document.getElementById('nav-grid');
        const toast = document.getElementById('toast');
        const progressText = document.getElementById('progress-text');
        const progressBar = document.getElementById('progress-bar');
        const scoreText = document.getElementById('score-text');
        
        let answeredCount = 0;
        let correctCount = 0;

        // HTML 轉義函式
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function init() {
            try {
                const response = await fetch('questions.json');
                if (!response.ok) throw new Error(`載入題目檔失敗：${response.status}`);
                questionsData = await response.json();
                progressText.innerText = `0/${questionsData.length}`;
            } catch (error) {
                quizContainer.innerHTML = `
                    <div class="bg-red-50 border border-red-200 text-red-700 p-4 rounded">
                        題庫讀取失敗：${error.message}
                    </div>
                `;
                console.error(error);
                return;
            }

            questionsData.forEach((item) => {
                // 生成導覽按鈕
                const navBtn = document.createElement('button');
                navBtn.id = `nav-${item.id}`;
                navBtn.className = "h-6 w-full flex items-center justify-center bg-white border border-slate-200 rounded text-[10px] font-bold hover:border-blue-400 hover:text-blue-600 transition-all active:scale-95";
                navBtn.innerText = item.id;
                navBtn.onclick = () => scrollToQuestion(item.id);
                navGrid.appendChild(navBtn);

                // 生成題目卡片
                const qCard = document.createElement('div');
                qCard.id = `q-${item.id}`;
                qCard.className = "bg-white p-3 md:p-4 rounded shadow-sm border border-slate-200 transition-all hover:shadow-md";
                
                let codeHtml = item.code ? `<pre><code>${escapeHtml(item.code)}</code></pre>` : "";
                
                qCard.innerHTML = `
                    <div class="flex items-start gap-2 mb-2">
                        <span class="flex-shrink-0 mt-0.5 bg-slate-800 text-white px-1.5 py-0.5 rounded text-[9px] font-black tracking-tighter">Q${item.id}</span>
                        <h3 class="text-sm md:text-base font-bold text-slate-800 leading-tight">${escapeHtml(item.q)}</h3>
                    </div>
                    ${codeHtml}
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-1 mt-2">
                        ${item.o.map((opt, i) => `
                            <button onclick="checkAnswer(${item.id}, ${i}, ${item.a})" 
                                    id="opt-${item.id}-${i}"
                                    class="option-btn group flex items-center p-2 border border-slate-100 rounded hover:border-blue-200 hover:bg-blue-50 transition-all text-left text-base md:text-base">
                                <span class="w-5 h-5 flex-shrink-0 flex items-center justify-center rounded border border-slate-200 mr-2 text-[11px] font-black group-hover:border-blue-400 group-hover:text-blue-600 uppercase">${String.fromCharCode(65 + i)}</span>
                                <span class="text-slate-700 font-medium">${escapeHtml(opt)}</span>
                            </button>
                        `).join('')}
                    </div>
                    <div id="result-${item.id}" class="hidden mt-2 p-2.5 rounded border-l-4 transform animate-in slide-in-from-bottom-1 duration-200">
                        <p id="feedback-${item.id}" class="text-base font-black mb-1"></p>
                        <div class="text-base text-slate-800 font-bold">正確答案：${String.fromCharCode(65 + item.a)}</div>
                        ${item.note ? `<div class="mt-1.5 pt-1.5 border-t border-black/5 text-base text-slate-600 leading-snug"><span class="font-bold text-slate-800">解析：</span>${escapeHtml(item.note)}</div>` : ""}
                    </div>
                `;
                quizContainer.appendChild(qCard);
            });
        }

        function scrollToQuestion(id) {
            const el = document.getElementById(`q-${id}`);
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            el.classList.add('ring-2', 'ring-blue-500', 'border-blue-500');
            setTimeout(() => el.classList.remove('ring-2', 'ring-blue-500', 'border-blue-500'), 1500);

            toast.innerText = `已跳轉至 Q${id}`;
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 1000);
        }

        function checkAnswer(qId, selectedIdx, correctIdx) {
            const navBtn = document.getElementById(`nav-${qId}`);
            if (navBtn.classList.contains('answered-nav')) return;

            answeredCount++;
            navBtn.classList.add('answered-nav');

            const resultDiv = document.getElementById(`result-${qId}`);
            const feedback = document.getElementById(`feedback-${qId}`);

            for (let i = 0; i < 4; i++) {
                const btn = document.getElementById(`opt-${qId}-${i}`);
                btn.disabled = true;
                if (i === correctIdx) {
                    btn.classList.add('border-green-500', 'bg-green-50');
                    btn.querySelector('span').classList.add('border-green-500', 'text-green-600', 'bg-white');
                } else if (i === selectedIdx) {
                    btn.classList.add('border-red-400', 'bg-red-50');
                    btn.querySelector('span').classList.add('border-red-400', 'text-red-500', 'bg-white');
                } else {
                    btn.classList.add('opacity-40');
                }
            }

            resultDiv.classList.remove('hidden');
            if (selectedIdx === correctIdx) {
                correctCount++;
                feedback.innerText = "✓ 正確";
                feedback.className = "text-green-700 text-sm font-black mb-1";
                resultDiv.classList.add('correct-bg');
                navBtn.classList.add('correct-nav');
            } else {
                feedback.innerText = "✗ 錯誤";
                feedback.className = "text-red-700 text-sm font-black mb-1";
                resultDiv.classList.add('wrong-bg');
                navBtn.classList.add('wrong-nav');
            }

            const percent = (answeredCount / questionsData.length) * 100;
            progressBar.style.width = `${percent}%`;
            progressText.innerText = `${answeredCount}/${questionsData.length}`;
            
            const scorePercent = Math.round((correctCount / answeredCount) * 100);
            scoreText.innerText = `${scorePercent}% 正確`;
        }

        window.onload = init;
    </script>
</body>
</html>
