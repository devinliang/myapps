<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Python 技能檢定測驗</title>
    <style>
        :root {
            /* 背景顏色 */
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #30292f;
            
            /* 邊框顏色 */
            --border-primary: #334155;
            --border-secondary: #475569;
            
            /* 文字顏色 */
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-tertiary: #cbd5e1;
            --text-light: #e2e8f0;
            --text-lighter: #f8fafc;
            
            /* 強調色 */
            --color-blue: #3b82f6;
            --color-blue-dark: #2563eb;
            --color-green: #10b981;
            --color-red: #ef4444;
            --color-yellow: #facc15;
        }
        
        @media (prefers-color-scheme: light) {
            :root {
                /* 背景顏色 - Light 模式 */
                --bg-primary: #f8fafc;
                --bg-secondary: #e2e8f0;
                --bg-tertiary: #cbd5e1;
                
                /* 邊框顏色 - Light 模式 */
                --border-primary: #cbd5e1;
                --border-secondary: #94a3b8;
                
                /* 文字顏色 - Light 模式 */
                --text-primary: #1e293b;
                --text-secondary: #475569;
                --text-tertiary: #64748b;
                --text-light: #334155;
                --text-lighter: #0f172a;
                
                /* 強調色保持不變 */
                --color-blue: #2563eb;
                --color-blue-dark: #1d4ed8;
                --color-green: #059669;
                --color-red: #dc2626;
                --color-yellow: #eab308;
            }
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; scroll-behavior: smooth; }
        html, body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        @media (prefers-color-scheme: dark) {
            html, body {
                background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            }
        }

        @media (prefers-color-scheme: light) {
            html, body {
                background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            }
        }
        
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 20px;
            background: var(--bg-primary);
        }
        @media (prefers-color-scheme: light) {
            .container {
                background: var(--bg-primary);
            }
        }
        .header {
            background: var(--bg-primary);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-bottom: 1px solid var(--border-primary);
            position: sticky;
            top: 0;
            z-index: 40;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        @media (prefers-color-scheme: light) {
            .header {
                background: var(--bg-primary);
            }
        }
        .header-title { display: flex; align-items: center; gap: 15px; }
        .header-title h1 { font-size: 24px; font-weight: bold; }
        .header-subtitle { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }
        .header-actions { display: flex; gap: 15px; }
        .btn-icon {
            width: 40px; height: 40px;
            border-radius: 8px;
            border: 1px solid var(--border-secondary);
            background: transparent;
            color: var(--text-tertiary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }
        .btn-icon:hover { background: var(--bg-secondary); }
        .bookmark-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid var(--border-secondary);
            background: var(--bg-primary);
            color: var(--text-secondary);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            padding: 0;
        }
        .bookmark-btn .bookmark-icon {
            width: 20px;
            height: 20px;
            display: block;
            background-image: url('star_blank.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        .bookmark-btn.selected {
            border-color: var(--color-yellow);
            background: var(--color-yellow);
            color: var(--color-yellow);
        }
        .bookmark-btn.selected .bookmark-icon {
            background-image: url('star_color.png');
        }
        
        .panel { 
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: 12px;
            padding: 30px;
            margin: 20px auto;
            max-width: 900px;
        }
        @media (prefers-color-scheme: light) {
            .panel {
                background: var(--bg-primary);
            }
        }
        .panel h2 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .panel-subtitle { color: var(--text-secondary); margin-bottom: 20px; }
        
        .mode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin: 20px 0;
        }
        .mode-card {
            border: 1px solid var(--border-primary);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            background: var(--color-blue);
            transition: all 0.3s;
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }
        .mode-card:hover {
            border-color: var(--color-blue);
            background: var(--color-blue);
            transform: translateY(-2px);
        }
        @media (prefers-color-scheme: light) {
            .mode-card {
                background: var(--bg-secondary);
            }
            .mode-card:hover {
                background: var(--bg-secondary);
            }
        }
        .mode-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }
        .mode-icon {
            width: 50px; height: 50px;
            border-radius: 8px;
            background: var(--color-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }
        .mode-title { font-weight: 600; font-size: 16px; }
        .mode-desc { color: var(--text-secondary); font-size: 12px; margin-top: 4px; }
        
        .settings { background: var(--bg-primary); padding: 15px; border-radius: 8px; margin: 20px 0; }
        @media (prefers-color-scheme: light) {
            .settings { background: var(--bg-secondary); }
        }
        .checkbox { margin-right: 8px; }
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
        }
        .btn-primary { background: var(--color-blue); color: white; }
        .btn-primary:hover { background: var(--color-blue-dark); }
        .btn-secondary { background: var(--border-primary); color: var(--text-light); }
        .btn-secondary:hover { background: var(--border-secondary); }
        
        .question-panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            max-width: none;
            margin: 0;
            min-height: 520px;
        }
        @media (prefers-color-scheme: light) {
            .question-panel {
                background: var(--bg-primary);
            }
        }
        .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .q-number { color: var(--text-secondary); font-size: 12px; font-weight: 600; }
        .q-text { font-size: 18px; font-weight: 600; margin: 15px 0; line-height: 1.6; }
        .q-code {
            background: var(--bg-primary);
            border: 1px solid var(--border-primary);
            border-radius: 8px;
            padding: 12px;
            margin: 15px 0;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: var(--text-tertiary);
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        .options { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }
        .option-btn {
            padding: 15px;
            border: 1px solid var(--border-primary);
            border-radius: 8px;
            background: var(--color-blue);
            color: var(--text-primary);
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        @media (prefers-color-scheme: light) {
            .option-btn {
                background: var(--bg-secondary);
            }
        }
        .option-btn:hover:not(:disabled) {
            border-color: var(--color-blue);
            background: var(--color-blue);
        }
        @media (prefers-color-scheme: light) {
            .option-btn:hover:not(:disabled) {
                background: var(--bg-secondary);
            }
        }
        .option-btn:disabled { cursor: not-allowed; }
        .option-btn.correct { border-color: var(--color-green); background: var(--color-green); }
        .option-btn.wrong { border-color: var(--color-red); background: var(--color-red); }
        @media (prefers-color-scheme: light) {
            .option-btn.correct { background: var(--color-green); }
            .option-btn.wrong { background: var(--color-red); }
        }
        .option-letter {
            width: 30px; height: 30px;
            border-radius: 6px;
            background: var(--border-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 12px;
            flex-shrink: 0;
        }
        .option-btn.correct .option-letter { background: var(--color-green); }
        .option-btn.wrong .option-letter { background: var(--color-red); }
        
        .feedback {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            display: none;
        }
        .feedback.show { display: block; }
        .feedback.correct { background: var(--color-green); border-left: 3px solid var(--color-green); color: var(--color-green); }
        .feedback.wrong { background: var(--color-red); border-left: 3px solid var(--color-red); color: var(--color-red); }
        @media (prefers-color-scheme: light) {
            .feedback.correct { background: var(--color-green); }
            .feedback.wrong { background: var(--color-red); }
        }
        .feedback-title { font-weight: 600; margin-bottom: 8px; }
        
        .quiz-layout {
            display: grid;
            grid-template-columns: 240px minmax(0, 1fr);
            gap: 24px;
            align-items: start;
        }
        .question-sidebar {
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: 16px;
            padding: 20px;
            max-height: calc(100vh - 170px);
            overflow-y: auto;
        }
        @media (prefers-color-scheme: light) {
            .question-sidebar {
                background: var(--bg-primary);
            }
        }
        .sidebar-title {
            margin-bottom: 16px;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-light);
        }
        .question-jump-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
        }
        .jump-btn {
            border: 1px solid var(--border-primary);
            border-radius: 10px;
            padding: 10px 0;
            background: var(--bg-primary);
            color: var(--text-lighter);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        @media (prefers-color-scheme: light) {
            .jump-btn {
                background: var(--bg-secondary);
                color: var(--text-primary);
            }
        }
        @media (prefers-color-scheme: light) {
            .jump-btn {
                background: var(--bg-secondary);
                color: var(--text-primary);
            }
        }
        .jump-btn:hover { background: var(--color-blue); }
        .jump-btn.current { border-color: var(--color-blue); background: var(--color-blue); }
        .jump-btn.answered { border-color: var(--color-green); background: var(--color-green); }
        .jump-btn.correct { border-color: var(--color-green); background: var(--color-green); }
        .jump-btn.wrong { border-color: var(--color-red); background: var(--color-red); }
        .jump-actions {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .jump-actions button {
            width: 100%;
        }
        @media (max-width: 1024px) {
            .quiz-layout { grid-template-columns: 1fr; }
            .question-sidebar { max-height: none; }
            .question-jump-grid { grid-template-columns: repeat(6, minmax(0, 1fr)); }
        }
        @media (max-width: 640px) {
            .question-jump-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
        }
        
        .results-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            margin: 20px auto;
            max-width: 700px;
        }
        @media (prefers-color-scheme: light) {
            .results-container {
                background: var(--bg-primary);
            }
        }
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }
        .result-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-primary);
            border-radius: 8px;
            padding: 15px;
        }
        @media (prefers-color-scheme: light) {
            .result-card {
                background: var(--bg-secondary);
            }
        }
        @media (prefers-color-scheme: light) {
            .result-card {
                background: var(--bg-secondary);
            }
        }
        .result-label { color: var(--text-secondary); font-size: 12px; margin-bottom: 8px; }
        .result-value { font-size: 24px; font-weight: 700; color: var(--color-blue); }
        
        .quiz-progress {
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }
        @media (prefers-color-scheme: light) {
            .quiz-progress {
                background: var(--bg-primary);
            }
        }
        
        .hidden { display: none !important; }
        
        @media (max-width: 768px) {
            .mode-grid { grid-template-columns: 1fr; }
            .panel { padding: 20px; }
            .question-panel { padding: 15px; }
            .q-text { font-size: 16px; }
            .results-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">
            <div style="font-size:24px;">🐍</div>
            <div>
                <h1>Python 核心能力題庫</h1>
                <div class="header-subtitle">目前共 <span id="total-count">加載中</span> 題</div>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn-icon" onclick="toggleMute()" title="靜音">🔊</button>
            <button class="btn-icon" onclick="toggleTheme()" title="暗色主題">🌙</button>
        </div>
    </div>

    <div class="container">
        <!-- 歡迎面板 -->
        <div id="welcome-panel" class="panel">
            <!-- <h2>Python 程式設計測驗</h2>
            <p class="panel-subtitle" id="welcome-desc">本測驗收錄了精選 Python 重點題目。</p> -->

            <!-- <h3 style="margin: 20px 0 15px; font-weight: 600; font-size: 16px;">📋 請選擇測驗模式</h3> -->
            <div class="mode-grid">
                <div class="mode-card" onclick="startQuiz('full')">
                    <div class="mode-icon">📚</div>
                    <div>
                        <div class="mode-title">全能挑戰模式 (<span id="mode-count">加載中</span> 題)</div>
                        <div class="mode-desc">完整作答所有題目。</div>
                    </div>
                </div>

                <div class="mode-card" onclick="startQuiz('speed')">
                    <div class="mode-icon">⚡</div>
                    <div>
                        <div class="mode-title">精選快問模式 (20 題)</div>
                        <div class="mode-desc">隨機抽取 20 道題目。</div>
                    </div>
                </div>

                <div class="mode-card disabled" id="weakness-card">
                    <div class="mode-icon">⚠️</div>
                    <div>
                        <div class="mode-title">錯題強化模式</div>
                        <div class="mode-desc" id="weakness-desc">目前尚無錯題紀錄。</div>
                    </div>
                </div>

                <div class="mode-card disabled" id="bookmark-card">
                    <div class="mode-icon">🔖</div>
                    <div>
                        <div class="mode-title">書籤複習模式</div>
                        <div class="mode-desc" id="bookmark-desc">目前無書籤。</div>
                    </div>
                </div>
            </div>

            <div class="settings">
                <label>
                    <input type="checkbox" class="checkbox" id="practice-mode" checked>
                    <span>啟用練習回饋</span>
                </label>
            </div>
        </div>

        <!-- 測驗面板 -->
        <div id="quiz-panel" class="hidden">
            <div class="quiz-progress">
                <div>
                    <span style="color: var(--color-blue); font-weight: 600;">全能挑戰</span>
                    <span style="color: var(--text-secondary); margin-left: 10px;">進度: <span id="progress" class="font-bold">0/0</span></span>
                </div>
                <div style="display: flex; gap: 20px;">
                    <div>計時: <span id="timer" style="font-family: monospace; font-weight: 600;">00:00</span></div>
                    <div>準確率: <span id="accuracy" style="color: var(--color-green); font-weight: 600;">100%</span></div>
                </div>
            </div>

            <div class="quiz-layout">
                <aside class="question-sidebar">
                    <div class="sidebar-title">題目選單</div>
                    <div id="question-nav" class="question-jump-grid"></div>
                    <div class="jump-actions">
                        <button class="btn btn-primary" onclick="finishQuizConfirmation()" id="sidebar-submit-btn">交卷</button>
                    </div>
                </aside>

                <div class="question-panel">
                    <div class="q-header">
                        <span class="q-number">QUESTION <span id="q-num">1</span></span>
                        <button class="bookmark-btn" onclick="toggleBookmark()" title="加入書籤" id="bookmark-btn"><span class="bookmark-icon"></span></button>
                    </div>

                    <div class="q-text" id="question-text">題目加載中...</div>
                    <div class="q-code hidden" id="code-box"></div>

                    <div class="options" id="options-container"></div>

                    <div class="feedback" id="feedback-box">
                        <div class="feedback-title" id="feedback-title"></div>
                        <div id="feedback-content"></div>
                    </div>

                    <div class="nav-buttons">
                        <button class="btn btn-secondary" onclick="prevQuestion()" id="prev-btn">← 上一題</button>
                        <button class="btn btn-primary" onclick="finishQuizConfirmation()" id="submit-btn">交卷</button>
                        <button class="btn btn-primary" onclick="nextQuestion()" id="next-btn">下一題 →</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 結果面板 -->
        <div id="results-panel" class="hidden results-container">
            <h2 style="font-size: 32px; margin-bottom: 20px;">🎉 本次作答結果</h2>
            <div class="results-grid">
                <div class="result-card">
                    <div class="result-label">答對題數</div>
                    <div class="result-value" id="result-score">0/0</div>
                </div>
                <div class="result-card">
                    <div class="result-label">準確率</div>
                    <div class="result-value" id="result-accuracy">0%</div>
                </div>
                <div class="result-card">
                    <div class="result-label">耗費時間</div>
                    <div class="result-value" id="result-time">00:00</div>
                </div>
            </div>

            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="btn btn-primary" onclick="returnToWelcome()">返回大廳</button>
                <button class="btn btn-secondary" onclick="retryQuiz()">重新挑戰</button>
            </div>
        </div>
    </div>

    <script>
        let allQuestions = [];
        let currentQuestions = [];
        let currentIndex = 0;
        let answers = {};
        let bookmarked = new Set();
        let wrong = new Set();
        let mode = '';
        let isPractice = true;
        let startTime = 0;
        let timerInterval = null;

        // 初始化
        async function init() {
            try {
                const res = await fetch('questions.json');
                allQuestions = await res.json();
                document.getElementById('total-count').textContent = allQuestions.length;
                document.getElementById('mode-count').textContent = allQuestions.length;
                loadStorage();
            } catch (e) {
                alert('無法加載題目: ' + e.message);
            }
        }

        function loadStorage() {
            const bk = localStorage.getItem('py_bookmarks');
            if (bk) bookmarked = new Set(JSON.parse(bk));
            const wr = localStorage.getItem('py_wrong');
            if (wr) wrong = new Set(JSON.parse(wr));
            updateModes();
        }

        function updateModes() {
            const wc = document.getElementById('weakness-card');
            const bc = document.getElementById('bookmark-card');
            
            if (wrong.size > 0) {
                wc.classList.remove('disabled');
                wc.onclick = () => startQuiz('weakness');
                document.getElementById('weakness-desc').innerHTML = `有 <strong>${wrong.size}</strong> 道錯題`;
            } else {
                wc.classList.add('disabled');
                wc.onclick = null;
                document.getElementById('weakness-desc').textContent = '目前尚無錯題紀錄。';
            }
            
            if (bookmarked.size > 0) {
                bc.classList.remove('disabled');
                bc.onclick = () => startQuiz('bookmark');
                document.getElementById('bookmark-desc').innerHTML = `已收藏 <strong>${bookmarked.size}</strong> 道題`;
            } else {
                bc.classList.add('disabled');
                bc.onclick = null;
                document.getElementById('bookmark-desc').textContent = '目前無書籤。';
            }
        }

        function startQuiz(m) {
            mode = m;
            isPractice = document.getElementById('practice-mode').checked;
            
            if (m === 'full') currentQuestions = allQuestions;
            else if (m === 'speed') currentQuestions = allQuestions.sort(() => 0.5 - Math.random()).slice(0, 20);
            else if (m === 'weakness') currentQuestions = allQuestions.filter(q => wrong.has(q.id));
            else if (m === 'bookmark') currentQuestions = allQuestions.filter(q => bookmarked.has(q.id));

            if (currentQuestions.length === 0) {
                alert('目前沒有可供此模式作答的題目。請先完成一般題目或新增書籤/錯題。');
                return;
            }

            answers = {};
            currentIndex = 0;
            startTime = Date.now();

            document.getElementById('welcome-panel').classList.add('hidden');
            document.getElementById('results-panel').classList.add('hidden');
            document.getElementById('quiz-panel').classList.remove('hidden');

            renderQuestion();
            renderQuestionNav();
            startTimer();
        }

        function renderQuestionNav() {
            const nav = document.getElementById('question-nav');
            nav.innerHTML = '';
            currentQuestions.forEach((q, index) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'jump-btn';
                btn.textContent = index + 1;
                const answer = answers[q.id];

                if (index === currentIndex) btn.classList.add('current');
                if (answer !== undefined) {
                    btn.classList.add('answered');
                    if (answer === q.a) btn.classList.add('correct');
                    else btn.classList.add('wrong');
                }

                btn.onclick = () => {
                    currentIndex = index;
                    renderQuestion();
                    renderQuestionNav();
                };
                nav.appendChild(btn);
            });
        }

        function renderQuestion() {
            if (currentQuestions.length === 0) return;
            const q = currentQuestions[currentIndex];

            document.getElementById('q-num').textContent = `${currentIndex + 1} / ${currentQuestions.length}`;
            document.getElementById('question-text').textContent = `${q.id}. ${q.q}`;
            document.getElementById('progress').textContent = `${currentIndex + 1} / ${currentQuestions.length}`;
            const bookmarkBtn = document.getElementById('bookmark-btn');
            if (bookmarked.has(q.id)) {
                bookmarkBtn.classList.add('selected');
                bookmarkBtn.title = '移除書籤';
            } else {
                bookmarkBtn.classList.remove('selected');
                bookmarkBtn.title = '加入書籤';
            }

            const cb = document.getElementById('code-box');
            if (q.code) {
                cb.textContent = q.code;
                cb.classList.remove('hidden');
            } else {
                cb.classList.add('hidden');
            }

            const oc = document.getElementById('options-container');
            oc.innerHTML = '';

            const answered = answers[q.id] !== undefined;
            q.o.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="option-letter">${String.fromCharCode(65 + i)}</span><span>${opt}</span>`;
                
                if (!answered) btn.onclick = () => selectAnswer(i);
                else btn.disabled = true;

                oc.appendChild(btn);
            });

            if (answered) {
                highlightAnswer(q);
            } else {
                const fb = document.getElementById('feedback-box');
                fb.classList.remove('show');
            }

            document.getElementById('prev-btn').disabled = currentIndex === 0;
            const nb = document.getElementById('next-btn');
            if (currentIndex === currentQuestions.length - 1) {
                nb.textContent = '最後一題';
                nb.onclick = nextQuestion;
            } else {
                nb.textContent = '下一題 →';
                nb.onclick = nextQuestion;
            }

            document.getElementById('submit-btn').disabled = currentQuestions.length === 0;
        }

        function selectAnswer(idx) {
            const q = currentQuestions[currentIndex];
            answers[q.id] = idx;

            if (idx !== q.a) wrong.add(q.id);
            else wrong.delete(q.id);
            
            localStorage.setItem('py_wrong', JSON.stringify(Array.from(wrong)));
            highlightAnswer(q);
            updateAccuracy();
            updateModes();
            renderQuestionNav();
        }

        function highlightAnswer(q) {
            const btns = document.querySelectorAll('.option-btn');
            const ans = answers[q.id];

            btns.forEach((btn, i) => {
                btn.disabled = true;
                if (i === q.a) {
                    btn.classList.add('correct');
                } else if (i === ans && ans !== q.a) {
                    btn.classList.add('wrong');
                }
            });

            if (isPractice) {
                const fb = document.getElementById('feedback-box');
                const fbTitle = document.getElementById('feedback-title');
                const fbContent = document.getElementById('feedback-content');

                fbTitle.textContent = ans === q.a ? '✓ 答案正確！' : '✗ 答案錯誤';
                fbContent.innerHTML = `正確答案: ${q.o[q.a]}<br>解析: ${q.note}`;
                fb.classList.add('show');
                fb.classList.toggle('correct', ans === q.a);
                fb.classList.toggle('wrong', ans !== q.a);
            }
        }

        function updateAccuracy() {
            let correct = 0, total = 0;
            currentQuestions.forEach(q => {
                if (answers[q.id] !== undefined) {
                    total++;
                    if (answers[q.id] === q.a) correct++;
                }
            });
            document.getElementById('accuracy').textContent = total === 0 ? '100%' : Math.round(correct / total * 100) + '%';
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
                renderQuestionNav();
            }
        }

        function nextQuestion() {
            if (currentIndex < currentQuestions.length - 1) {
                currentIndex++;
                renderQuestion();
                renderQuestionNav();
            }
        }

        function toggleBookmark() {
            const q = currentQuestions[currentIndex];
            if (bookmarked.has(q.id)) bookmarked.delete(q.id);
            else bookmarked.add(q.id);
            localStorage.setItem('py_bookmarks', JSON.stringify(Array.from(bookmarked)));
            updateModes();
            renderQuestion();
            renderQuestionNav();
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const m = Math.floor(elapsed / 60);
                const s = elapsed % 60;
                document.getElementById('timer').textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }, 1000);
        }

        function finishQuizConfirmation() {
            if (!confirm('確認要交卷嗎？交卷後即無法修改答案。')) return;
            finishQuiz();
        }

        function finishQuiz() {
            let correct = 0;
            currentQuestions.forEach(q => {
                if (answers[q.id] === q.a) correct++;
            });

            const total = currentQuestions.length;
            const score = correct;
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const m = Math.floor(elapsed / 60);
            const s = elapsed % 60;

            const accuracy = Math.round(correct / total * 100);
            document.getElementById('result-score').textContent = `${score} / ${total}`;
            document.getElementById('result-accuracy').textContent = `${accuracy}%`;
            document.getElementById('result-time').textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;

            document.getElementById('quiz-panel').classList.add('hidden');
            document.getElementById('results-panel').classList.remove('hidden');
        }

        function returnToWelcome() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            currentQuestions = [];
            currentIndex = 0;
            document.getElementById('quiz-panel').classList.add('hidden');
            document.getElementById('results-panel').classList.add('hidden');
            document.getElementById('welcome-panel').classList.remove('hidden');
            updateModes();
        }

        function retryQuiz() {
            startQuiz(mode);
        }

        function toggleMute() { alert('音效已禁用 (演示版)'); }
        function toggleTheme() { document.body.style.filter = document.body.style.filter === 'invert(1)' ? '' : 'invert(1)'; }

        init();
    </script>
</body>
</html>
