<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>現代倒數計時器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap');
        
        /* CSS 顏色變數設定區 - 改為土耳其藍與清淡柔和主題 */
        :root {
            --bg-from: #7dd3c7;           /* 背景漸層起始 (柔和土耳其藍) */
            --bg-to: #d7f3ef;             /* 背景漸層結束 (偏淡天藍) */
            --card-bg: rgba(255, 255, 255, 0.75);
            --card-border: rgba(15, 118, 110, 0.16);
            
            --primary-color: #2a9d8f;     /* 主色調 (土耳其藍) */
            --primary-hover: #21867a;     /* 懸停色 */
            --accent-color: #4db6ac;      /* 強調色 (較淡土耳其藍) */
            
            --warning-color: #f59e0b;     /* 警告色 (保持橘黃以供辨識) */
            --warning-hover: #d97706;
            
            --danger-color: #ef4444;      /* 危險色 (保持紅色以供辨識) */
            --danger-hover: #dc2626;
            
            --gray-color: #94a3b8;        /* 灰色 (重設按鈕) */
            --gray-hover: #64748b;
            
            --text-main: #134e4a;         /* 主要文字 */
            --text-dim: #3f6d6a;          /* 次要文字 */
            
            --ring-bg: rgba(42, 157, 143, 0.16); /* 進度條底色 */
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-from) 0%, var(--bg-to) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            overflow: hidden;
            padding: 1rem 0;
        }

        .timer-display {
            font-family: 'JetBrains Mono', monospace;
            font-variant-numeric: tabular-nums;
            min-width: 8ch; 
        }

        #current-time {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
            margin-bottom: 1rem;
        }

        #current-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            letter-spacing: 0.04em;
            color: var(--text-dim);
            opacity: 0.85;
        }

        #current-time-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--text-main);
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: min(100%, 34rem);
            max-height: calc(100vh - 1.5rem);
        }

        .input-group input {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(42, 157, 143, 0.18);
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 0 0 4px rgba(42, 157, 143, 0.16);
        }

        .progress-ring {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        /* 按鈕基礎樣式 */
        .btn-primary { background-color: var(--primary-color); }
        .btn-primary:hover { background-color: var(--primary-hover); }
        
        .btn-warning { background-color: var(--warning-color); }
        .btn-warning:hover { background-color: var(--warning-hover); }

        .btn-danger { background-color: var(--danger-color); }
        .btn-danger:hover { background-color: var(--danger-hover); }

        .btn-gray { background-color: var(--gray-color); }
        .btn-gray:hover { background-color: var(--gray-hover); }

        /* 彈窗動畫 */
        #alarm-modal {
            transition: all 0.3s ease-out;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.9);
        }

        #alarm-modal.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        @keyframes pulse-red {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        .time-up {
            animation: pulse-red 1s infinite;
            color: var(--danger-color);
        }

        @media (max-width: 640px) {
            .glass-card {
                padding: 1.3rem 0.95rem;
            }
            #current-time-text {
                font-size: 1.2rem;
            }
            h1 {
                font-size: 1.85rem;
                margin-bottom: 1.25rem;
            }
            .relative.inline-flex svg {
                width: 12rem;
                height: 12rem;
            }
            .timer-display {
                font-size: 2rem;
            }
            .input-group input {
                padding: 0.7rem 0.9rem;
            }
            .grid.grid-cols-3 {
                gap: 0.65rem;
            }
            .preset-btn {
                font-size: 0.72rem;
                padding: 0.7rem 0.6rem;
            }
            .flex.gap-4 {
                flex-direction: column;
            }
            .flex.gap-4 > button {
                width: 100%;
            }
            #elapsedTime,
            #targetTime,
            #message {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <!-- 主體內容 -->
    <div class="glass-card p-8 md:p-12 w-full max-w-md mx-4 text-center">
        <div id="current-time">
            <div id="current-date"></div>
            <div id="current-time-text"></div>
        </div>
        <h1 class="text-3xl font-bold mb-8 tracking-tight" style="color: var(--accent-color);">倒數計時器</h1>

        <!-- 圓形進度條與顯示 -->
        <div class="relative inline-flex items-center justify-center mb-6">
            <svg class="w-64 h-64">
                <circle style="color: var(--ring-bg);" stroke-width="8" stroke="currentColor" fill="transparent" r="120" cx="128" cy="128" />
                <circle id="progress-bar" style="color: var(--primary-color);" class="progress-ring" stroke-width="8" stroke-dasharray="753.98" stroke-dashoffset="0" stroke-linecap="round" stroke="currentColor" fill="transparent" r="120" cx="128" cy="128" />
            </svg>
            <div id="display" class="timer-display absolute text-4xl font-bold tracking-tight">00:00:00</div>
        </div>

        <!-- 設定區域 -->
        <div id="setup-controls">
            <!-- 時間輸入 -->
            <div class="grid grid-cols-3 gap-4 mb-8">
                <div class="input-group">
                    <label class="block text-xs uppercase tracking-widest mb-1" style="color: var(--text-dim);">時</label>
                    <input type="number" id="hrs" min="0" max="23" value="0" class="w-full text-center py-3 rounded-xl text-xl font-bold" placeholder="00">
                </div>
                <div class="input-group">
                    <label class="block text-xs uppercase tracking-widest mb-1" style="color: var(--text-dim);">分</label>
                    <input type="number" id="mins" min="0" max="59" value="0" class="w-full text-center py-3 rounded-xl text-xl font-bold" placeholder="00">
                </div>
                <div class="input-group">
                    <label class="block text-xs uppercase tracking-widest mb-1" style="color: var(--text-dim);">秒</label>
                    <input type="number" id="secs" min="0" max="59" value="0" class="w-full text-center py-3 rounded-xl text-xl font-bold" placeholder="00">
                </div>
            </div>
            <div class="mb-6 text-left">
                <p class="text-xs uppercase tracking-widest mb-3" style="color: var(--text-dim);">快速設定</p>
                <div class="grid grid-cols-5 gap-2">
                    <button type="button" class="preset-btn btn-gray text-white text-sm font-semibold py-3 rounded-2xl transition-all active:scale-95" data-h="0" data-m="0" data-s="30">30秒</button>
                    <button type="button" class="preset-btn btn-gray text-white text-sm font-semibold py-3 rounded-2xl transition-all active:scale-95" data-h="0" data-m="1" data-s="0">1分鐘</button>
                    <button type="button" class="preset-btn btn-gray text-white text-sm font-semibold py-3 rounded-2xl transition-all active:scale-95" data-h="0" data-m="3" data-s="0">3分鐘</button>
                    <button type="button" class="preset-btn btn-gray text-white text-sm font-semibold py-3 rounded-2xl transition-all active:scale-95" data-h="0" data-m="5" data-s="0">5分鐘</button>
                    <button type="button" class="preset-btn btn-gray text-white text-sm font-semibold py-3 rounded-2xl transition-all active:scale-95" data-h="0" data-m="10" data-s="0">10分鐘</button>
                </div>
            </div>
        </div>

        <!-- 按鈕控制 -->
        <div class="flex gap-4">
            <button id="resetBtn" class="btn-gray text-white font-bold py-4 px-8 rounded-2xl transition-all active:scale-95">
                重設
            </button>
            <button id="startPauseBtn" class="flex-1 btn-primary text-white font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-lg">
                開始計時
            </button>
        </div>

        <!-- 已計時顯示 -->
        <div id="elapsedTime" class="mt-4 text-base font-medium text-slate-700" style="color: var(--text-dim);">已計時：00:00:00</div>
        <div id="targetTime" class="mt-2 text-sm font-medium" style="color: var(--text-dim);">結束時間：--:--:--</div>

        <!-- 訊息提示 -->
        <div id="message" class="mt-4 text-sm font-medium min-h-[1.25rem]" style="color: var(--text-dim);"></div>
    </div>

    <!-- 提醒彈窗 (Modal) -->
    <div id="alarm-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
        <div class="bg-slate-800 border border-white/10 p-8 rounded-3xl max-w-xs w-full text-center shadow-2xl">
            <div class="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 animate-pulse" style="background-color: rgba(239, 68, 68, 0.2); color: var(--danger-color);">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold mb-2">時間到了！</h2>
            <p class="mb-8" style="color: var(--text-dim);">計時器已歸零，請確認您的任務。</p>
            <button id="stopAlarmBtn" class="w-full btn-danger text-white font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-lg">
                停止提醒
            </button>
        </div>
    </div>

    <script>
        let countdown;
        let totalSeconds = 0;
        let remainingSeconds = 0;
        let isRunning = false;
        let audioCtx = null;
        let alarmInterval = null;

        const display = document.getElementById('display');
        const progressBar = document.getElementById('progress-bar');
        const currentDateDisplay = document.getElementById('current-date');
        const currentTimeTextDisplay = document.getElementById('current-time-text');
        const startPauseBtn = document.getElementById('startPauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const message = document.getElementById('message');
        const alarmModal = document.getElementById('alarm-modal');
        const stopAlarmBtn = document.getElementById('stopAlarmBtn');
        const elapsedTimeDisplay = document.getElementById('elapsedTime');
        const targetTimeDisplay = document.getElementById('targetTime');
        
        const inputFields = {
            hrs: document.getElementById('hrs'),
            mins: document.getElementById('mins'),
            secs: document.getElementById('secs')
        };
        const presetButtons = document.querySelectorAll('.preset-btn');

        const CIRCUMFERENCE = 2 * Math.PI * 120;
        progressBar.style.strokeDasharray = CIRCUMFERENCE;
        progressBar.style.strokeDashoffset = 0;

        function updateCurrentTime() {
            const now = new Date();
            currentDateDisplay.textContent = now.toLocaleDateString('zh-TW', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                weekday: 'short'
            });
            currentTimeTextDisplay.textContent = now.toLocaleTimeString('zh-TW', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
        }

        updateCurrentTime();
        setInterval(updateCurrentTime, 1000);

        function playAlarmPulse() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            const playSingleBeep = () => {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
                
                const now = audioCtx.currentTime;
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.2, now + 0.2);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.8);

                oscillator.start(now);
                oscillator.stop(now + 1.0);
            };

            playSingleBeep();
            alarmInterval = setInterval(playSingleBeep, 1500);
        }

        function stopAlarm() {
            if (alarmInterval) {
                clearInterval(alarmInterval);
                alarmInterval = null;
            }
            alarmModal.classList.remove('active');
            resetTimer();
        }

        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function formatClockTime(date) {
            return date.toLocaleTimeString('zh-TW', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
        }

        function updateElapsedTimeDisplay(elapsedSeconds) {
            elapsedTimeDisplay.textContent = `已計時：${formatTime(elapsedSeconds)}`;
        }

        function updateTargetTimeDisplay(endDate) {
            if (endDate) {
                targetTimeDisplay.textContent = `結束時間：${formatClockTime(endDate)}`;
            } else {
                targetTimeDisplay.textContent = '結束時間：--:--:--';
            }
        }

        function setPresetTime(hours, minutes, seconds) {
            inputFields.hrs.value = hours;
            inputFields.mins.value = minutes;
            inputFields.secs.value = seconds;

            if (!isRunning) {
                totalSeconds = hours * 3600 + minutes * 60 + seconds;
                remainingSeconds = totalSeconds;
                updateDisplay(remainingSeconds);
                updateElapsedTimeDisplay(0);
                updateTargetTimeDisplay(null);
            }
        }

        function updateDisplay(seconds) {
            display.textContent = formatTime(seconds);
            
            if (totalSeconds > 0) {
                const offset = CIRCUMFERENCE - (seconds / totalSeconds) * CIRCUMFERENCE;
                progressBar.style.strokeDashoffset = offset;
                updateElapsedTimeDisplay(totalSeconds - seconds);
            } else {
                progressBar.style.strokeDashoffset = 0;
                updateElapsedTimeDisplay(0);
            }
        }

        function startTimer() {
            if (!isRunning) {
                if (remainingSeconds <= 0) {
                    const h = parseInt(inputFields.hrs.value) || 0;
                    const m = parseInt(inputFields.mins.value) || 0;
                    const s = parseInt(inputFields.secs.value) || 0;
                    
                    totalSeconds = h * 3600 + m * 60 + s;
                    remainingSeconds = totalSeconds;

                    if (totalSeconds <= 0) {
                        showMessage("請設定有效的時間", "text-yellow-500");
                        return;
                    }
                }

                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }

                const endDate = new Date(Date.now() + remainingSeconds * 1000);
                updateTargetTimeDisplay(endDate);

                isRunning = true;
                startPauseBtn.textContent = "暫停";
                startPauseBtn.classList.replace('btn-primary', 'btn-warning');
                showMessage("計時中...", "");
                
                document.getElementById('setup-controls').classList.add('opacity-50', 'pointer-events-none');
                updateElapsedTimeDisplay(totalSeconds - remainingSeconds);

                countdown = setInterval(() => {
                    remainingSeconds--;
                    updateDisplay(remainingSeconds);

                    if (remainingSeconds <= 0) {
                        clearInterval(countdown);
                        timerFinished();
                    }
                }, 1000);
            } else {
                pauseTimer();
            }
        }

        function pauseTimer() {
            clearInterval(countdown);
            isRunning = false;
            startPauseBtn.textContent = "繼續";
            startPauseBtn.classList.replace('btn-warning', 'btn-primary');
            showMessage("已暫停", "");
        }

        function timerFinished() {
            isRunning = false;
            display.classList.add('time-up');
            showMessage("時間到！", "font-bold");
            
            alarmModal.classList.add('active');
            playAlarmPulse();
        }

        function resetTimer() {
            clearInterval(countdown);
            if (alarmInterval) clearInterval(alarmInterval);
            
            isRunning = false;
            remainingSeconds = 0;
            totalSeconds = 0;
            
            updateDisplay(0);
            updateElapsedTimeDisplay(0);
            updateTargetTimeDisplay(null);
            display.classList.remove('time-up');
            startPauseBtn.textContent = "開始計時";
            startPauseBtn.className = "flex-1 btn-primary text-white font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-lg";
            
            document.getElementById('setup-controls').classList.remove('opacity-50', 'pointer-events-none');
            showMessage("", "");
            
            inputFields.hrs.value = 0;
            inputFields.mins.value = 0;
            inputFields.secs.value = 0;
        }

        function showMessage(text, extraClass) {
            message.textContent = text;
            message.className = `mt-6 text-sm min-h-[1.25rem] ${extraClass}`;
        }

        startPauseBtn.addEventListener('click', startTimer);
        resetBtn.addEventListener('click', resetTimer);
        stopAlarmBtn.addEventListener('click', stopAlarm);
        presetButtons.forEach(button => {
            button.addEventListener('click', () => {
                setPresetTime(
                    parseInt(button.dataset.h, 10),
                    parseInt(button.dataset.m, 10),
                    parseInt(button.dataset.s, 10)
                );
            });
        });

        [inputFields.hrs, inputFields.mins, inputFields.secs].forEach(input => {
            input.addEventListener('change', function() {
                if (this.value < 0) this.value = 0;
                if (this.id !== 'hrs' && this.value > 59) this.value = 59;
                if (this.id === 'hrs' && this.value > 23) this.value = 23;
            });
        });
    </script>
</body>
</html>
