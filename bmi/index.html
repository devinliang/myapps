<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>BMI Calculator</h1>
        <form id="bmi-form">
            <label for="weight">體重 (公斤):</label>
            <input type="number" id="weight" name="weight" min="0" step="any" required>

            <label for="height">身高 (公分):</label>
            <input type="number" id="height" name="height" min="0" step="any" required>

            <button type="button" id="calculate-btn">計算BMI</button>
        </form>
        <div id="result"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
